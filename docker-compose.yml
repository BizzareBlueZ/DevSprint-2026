services:

  # ── Infrastructure ──────────────────────────────────────────

  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/01-init.sql
    networks:
      - cafeteria-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d cafeteria"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    networks:
      - cafeteria-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  rabbitmq:
    image: rabbitmq:3-management-alpine
    ports:
      - "15672:15672"   # Web UI: http://localhost:15672 (credentials in .env)
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD}
      RABBITMQ_ERLANG_COOKIE: ${RABBITMQ_ERLANG_COOKIE}
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - cafeteria-net
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── pgAdmin — Web-based Database Viewer ─────────────────────
  pgadmin:
    image: dpage/pgadmin4:latest
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD}
      PGADMIN_CONFIG_SERVER_MODE: ${PGADMIN_CONFIG_SERVER_MODE}
      PGADMIN_CONFIG_MASTER_PASSWORD_REQUIRED: ${PGADMIN_CONFIG_MASTER_PASSWORD_REQUIRED}
    ports:
      - "5050:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
      - ./database/pgadmin-servers.json:/pgadmin4/servers.json
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - cafeteria-net

  # ── Application Services ────────────────────────────────────────

  identity-provider:
    build: ./identity-provider
    ports:
      - "${IDENTITY_PROVIDER_PORT}:3001"
    environment:
      PORT: 3001
      NODE_ENV: ${NODE_ENV:-production}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN}
      ENABLE_HTTPS: ${ENABLE_HTTPS:-false}
      VAPID_PUBLIC_KEY: ${VAPID_PUBLIC_KEY}
      VAPID_PRIVATE_KEY: ${VAPID_PRIVATE_KEY}
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT}
      DB_NAME: ${POSTGRES_DB}
      DB_USER: ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - cafeteria-net

  order-gateway:
    build: ./order-gateway
    ports:
      - "${ORDER_GATEWAY_PORT}:3000"
    environment:
      PORT: 3000
      JWT_SECRET: ${JWT_SECRET}
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT}
      DB_NAME: ${POSTGRES_DB}
      DB_USER: ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      REDIS_URL: ${REDIS_URL}
      RABBITMQ_URL: ${RABBITMQ_URL}
      STOCK_SERVICE_URL: ${STOCK_SERVICE_URL}
      NOTIFICATION_HUB_URL: ${NOTIFICATION_HUB_URL}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - cafeteria-net

  stock-service:
    build: ./stock-service
    ports:
      - "${STOCK_SERVICE_PORT}:3002"
    environment:
      PORT: 3002
      JWT_SECRET: ${JWT_SECRET}
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT}
      DB_NAME: ${POSTGRES_DB}
      DB_USER: ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      REDIS_URL: ${REDIS_URL}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - cafeteria-net

  kitchen-queue:
    build: ./kitchen-queue
    ports:
      - "${KITCHEN_QUEUE_PORT}:3003"
    environment:
      PORT: 3003
      JWT_SECRET: ${JWT_SECRET}
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT}
      DB_NAME: ${POSTGRES_DB}
      DB_USER: ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      RABBITMQ_URL: ${RABBITMQ_URL}
      NOTIFICATION_HUB_URL: ${NOTIFICATION_HUB_URL}
      KITCHEN_MIN_MS: 3000
      KITCHEN_MAX_MS: 7000
    depends_on:
      rabbitmq:
        condition: service_healthy
    networks:
      - cafeteria-net

  notification-hub:
    build: ./notification-hub
    ports:
      - "${NOTIFICATION_HUB_PORT}:3004"
    environment:
      PORT: 3004
      JWT_SECRET: ${JWT_SECRET}
      VAPID_PUBLIC_KEY: ${VAPID_PUBLIC_KEY}
      VAPID_PRIVATE_KEY: ${VAPID_PRIVATE_KEY}
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT}
      DB_NAME: ${POSTGRES_DB}
      DB_USER: ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
    networks:
      - cafeteria-net

  api-gateway:
    build: ./api-gateway
    ports:
      - "8080:8080"
    environment:
      PORT: 8080
      NODE_ENV: ${NODE_ENV:-production}
      JWT_SECRET: ${JWT_SECRET}
      REDIS_URL: ${REDIS_URL}
      IDENTITY_PROVIDER_URL: http://identity-provider:3001
      ORDER_GATEWAY_URL: http://order-gateway:3000
      STOCK_SERVICE_URL: http://stock-service:3002
      KITCHEN_QUEUE_URL: http://kitchen-queue:3003
      NOTIFICATION_HUB_URL: http://notification-hub:3004
    depends_on:
      redis:
        condition: service_healthy
      identity-provider:
        condition: service_started
      order-gateway:
        condition: service_started
      stock-service:
        condition: service_started
      kitchen-queue:
        condition: service_started
      notification-hub:
        condition: service_started
    networks:
      - cafeteria-net

  frontend:
    build: ./frontend
    ports:
      - "80:80"
      - "443:443"
    environment:
      ENABLE_HTTPS: ${ENABLE_HTTPS:-false}
      SSL_CERT_PATH: ${SSL_CERT_PATH:-/etc/nginx/ssl/cert.pem}
      SSL_KEY_PATH: ${SSL_KEY_PATH:-/etc/nginx/ssl/key.pem}
    depends_on:
      - order-gateway
      - notification-hub
    networks:
      - cafeteria-net

networks:
  cafeteria-net:
    driver: bridge

volumes:
  postgres_data:
  pgadmin_data:
  rabbitmq_data: