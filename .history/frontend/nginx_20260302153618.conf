server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Use Docker DNS resolver for runtime upstream resolution
    resolver 127.0.0.11 valid=10s;

    # Proxy auth API to identity-provider
    location /api/auth/ {
        set $upstream_auth http://identity-provider:3001;
        rewrite ^/api/auth/(.*) /$1 break;
        proxy_pass $upstream_auth;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Proxy all other API calls to order-gateway
    location /api/ {
        set $upstream_api http://order-gateway:3000;
        rewrite ^/api/(.*) /$1 break;
        proxy_pass $upstream_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Socket.IO — proxy to notification-hub with WebSocket support
    location /socket.io/ {
        set $upstream_ws http://notification-hub:3004;
        proxy_pass $upstream_ws;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 86400s;
    }

    # Admin proxy routes for dashboard
    location /admin/identity/ {
        set $upstream_identity http://identity-provider:3001;
        rewrite ^/admin/identity/(.*) /$1 break;
        proxy_pass $upstream_identity;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /admin/gateway/ {
        set $upstream_gateway http://order-gateway:3000;
        rewrite ^/admin/gateway/(.*) /$1 break;
        proxy_pass $upstream_gateway;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /admin/stock/ {
        set $upstream_stock http://stock-service:3002;
        rewrite ^/admin/stock/(.*) /$1 break;
        proxy_pass $upstream_stock;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /admin/kitchen/ {
        set $upstream_kitchen http://kitchen-queue:3003;
        rewrite ^/admin/kitchen/(.*) /$1 break;
        proxy_pass $upstream_kitchen;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /admin/notifications/ {
        set $upstream_notif http://notification-hub:3004;
        rewrite ^/admin/notifications/(.*) /$1 break;
        proxy_pass $upstream_notif;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # React SPA - all routes serve index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Static assets caching
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Deny access to sensitive files
    location ~ /\. {
        deny all;
    }

    location ~ \.(env|yaml|yml|json|sql)$ {
        deny all;
    }
}
